name: Feature request
description: Propose a TerminalSim enhancement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or workflow limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behavior, API, command, or workflow you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe other approaches you considered and why they are less suitable.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add diagrams, examples, related issues, or references that help explain the request.
    validations:
      required: false
