# Release packaging for tagged TerminalSim releases.
#
# linux-installer and windows-installer build in parallel. The publish job runs
# only when both succeed, then attaches both assets to the GitHub Release with
# a combined checksum table.
#
# macOS is intentionally deferred until notarization is sorted.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  CONTAINER_REF: v0.2.0
  CMAKE_BUILD_PARALLEL_LEVEL: 2

jobs:
  # ------------------------------------------------------------------ Linux ---
  linux-installer:
    name: Linux Installer
    runs-on: ubuntu-24.04

    env:
      DEPS_PREFIX: ${{ github.workspace }}/deps/install
      CMAKE_CXX_COMPILER_LAUNCHER: ccache

    steps:
      - name: Check out TerminalSim
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Container token
        env:
          CONTAINER_REPO_TOKEN: ${{ secrets.CONTAINER_REPO_TOKEN }}
        run: |
          if [ -z "${CONTAINER_REPO_TOKEN}" ]; then
            echo "::error::CONTAINER_REPO_TOKEN is required to check out the private Container dependency."
            exit 1
          fi

      - name: Check out Container
        uses: actions/checkout@v4
        with:
          repository: AhmedAredah/container
          token: ${{ secrets.CONTAINER_REPO_TOKEN }}
          ref: ${{ env.CONTAINER_REF }}
          path: deps/container

      - name: Install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake qt6-base-dev qt6-tools-dev librabbitmq-dev build-essential ninja-build ccache python3-venv patchelf file
          version: 1.0

      - name: Install Qt Installer Framework
        run: |
          python3 -m venv "${RUNNER_TEMP}/aqt"
          "${RUNNER_TEMP}/aqt/bin/python" -m pip install --upgrade pip
          "${RUNNER_TEMP}/aqt/bin/python" -m pip install "aqtinstall==3.3.0"
          "${RUNNER_TEMP}/aqt/bin/python" -m aqt install-tool \
            -O "${RUNNER_TEMP}/Qt" \
            linux desktop tools_ifw

          ifw_root="$(find "${RUNNER_TEMP}/Qt/Tools/QtInstallerFramework" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          if [ -z "${ifw_root}" ] || [ ! -x "${ifw_root}/bin/binarycreator" ]; then
            echo "::error::Qt Installer Framework binarycreator was not installed."
            exit 1
          fi

          echo "QTIFW_ROOT=${ifw_root}" >> "${GITHUB_ENV}"
          echo "${ifw_root}/bin" >> "${GITHUB_PATH}"

      - name: Prepare RabbitMQ-C include compatibility
        # Ubuntu 24.04 librabbitmq-dev ships flat /usr/include/amqp_*.h headers,
        # but TerminalSim sources include them via the newer namespaced path
        # (<rabbitmq-c/framing.h>, etc.). Create both spellings.
        run: |
          mkdir -p "${DEPS_PREFIX}/include/rabbitmq-c"
          for header in /usr/include/amqp*.h; do
            base=$(basename "${header}")
            ln -sf "${header}" "${DEPS_PREFIX}/include/rabbitmq-c/${base}"
            if [[ "${base}" == amqp_* ]]; then
              ln -sf "${header}" "${DEPS_PREFIX}/include/rabbitmq-c/${base#amqp_}"
            fi
          done

      - name: Cache compiler output
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: linux-release-ccache-${{ env.CONTAINER_REF }}-${{ hashFiles('CMakeLists.txt', 'src/**/CMakeLists.txt', 'installer/**') }}
          restore-keys: linux-release-ccache-

      - name: Configure Container
        run: |
          cmake -S deps/container -B deps/build/container -G Ninja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_INSTALL_PREFIX="${DEPS_PREFIX}" \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_PYTHON_BINDINGS=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_DOCS=OFF \
            -DCMAKE_CXX_COMPILER_LAUNCHER="${CMAKE_CXX_COMPILER_LAUNCHER}"

      - name: Install Container
        run: cmake --build deps/build/container --target install

      - name: Configure TerminalSim with installer
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/build/install" \
            -DCMAKE_PREFIX_PATH="${DEPS_PREFIX};/usr" \
            -DCONTAINER_CMAKE_DIR="${DEPS_PREFIX}/lib/cmake/Container" \
            -DRABBITMQ_CMAKE_DIR="/usr/lib/x86_64-linux-gnu/cmake/rabbitmq-c" \
            -DCPACK_IFW_ROOT="${QTIFW_ROOT}" \
            -DBUILD_INSTALLER=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER="${CMAKE_CXX_COMPILER_LAUNCHER}"

      - name: Build TerminalSim
        run: cmake --build build

      - name: Install TerminalSim
        run: cmake --build build --target install

      - name: Generate Linux installer
        env:
          QT_QPA_PLATFORM: offscreen
        working-directory: build
        run: cpack -G IFW -C Release

      - name: Collect release asset
        run: |
          mkdir -p dist
          ref_name="${GITHUB_REF_NAME//\//-}"
          installer="$(find build -maxdepth 1 -type f -name 'TerminalSim*.run' | sort | head -n 1)"

          if [ -z "${installer}" ]; then
            echo "::error::No Linux installer .run file was produced by CPack."
            find build -maxdepth 2 -type f | sort
            exit 1
          fi

          installer_name="TerminalSim-${ref_name}-linux-x86_64.run"
          cp "${installer}" "dist/${installer_name}"
          (cd dist && sha256sum "${installer_name}" > "${installer_name}.sha256")
          file "dist/${installer_name}"
          cat "dist/${installer_name}.sha256"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminalsim-linux
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------- Windows ---
  windows-installer:
    name: Windows Installer
    runs-on: windows-2022

    env:
      DEPS_PREFIX: ${{ github.workspace }}\deps\install
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - name: Check out TerminalSim
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Container token
        env:
          CONTAINER_REPO_TOKEN: ${{ secrets.CONTAINER_REPO_TOKEN }}
        shell: bash
        run: |
          if [ -z "${CONTAINER_REPO_TOKEN}" ]; then
            echo "::error::CONTAINER_REPO_TOKEN is required."
            exit 1
          fi

      - name: Check out Container
        uses: actions/checkout@v4
        with:
          repository: AhmedAredah/container
          token: ${{ secrets.CONTAINER_REPO_TOKEN }}
          ref: ${{ env.CONTAINER_REF }}
          path: deps/container

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt 6 and Qt Installer Framework
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: ''
          tools: 'tools_ifw'
          cache: true
          add-tools-to-path: true

      - name: Resolve Qt Installer Framework root
        shell: pwsh
        run: |
          $ifwRoot = Get-ChildItem -Directory `
              "$env:IQTA_TOOLS\QtInstallerFramework" |
              Sort-Object Name -Descending |
              Select-Object -First 1
          if (-not $ifwRoot) {
              Write-Error "Qt Installer Framework not found under $env:IQTA_TOOLS"
              exit 1
          }
          "QTIFW_ROOT=$($ifwRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$($ifwRoot.FullName)\bin"        | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install RabbitMQ-C via vcpkg
        shell: pwsh
        run: |
          vcpkg install rabbitmq-c:x64-windows
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          "VCPKG_TOOLCHAIN_FILE=$vcpkgRoot\scripts\buildsystems\vcpkg.cmake" |
              Out-File -FilePath $env:GITHUB_ENV -Append
          "RABBITMQ_CMAKE_DIR=$vcpkgRoot\installed\x64-windows\share\rabbitmq-c" |
              Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure Container
        shell: pwsh
        run: |
          cmake -S deps/container -B deps/build/container -G Ninja `
            -DCMAKE_BUILD_TYPE="$env:BUILD_TYPE" `
            -DCMAKE_INSTALL_PREFIX="$env:DEPS_PREFIX" `
            -DBUILD_SHARED_LIBS=ON `
            -DBUILD_PYTHON_BINDINGS=OFF `
            -DBUILD_TESTING=OFF `
            -DBUILD_DOCS=OFF

      - name: Install Container
        shell: pwsh
        run: cmake --build deps/build/container --target install

      - name: Configure TerminalSim with installer
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE="$env:BUILD_TYPE" `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\build\install" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_TOOLCHAIN_FILE" `
            -DCMAKE_PREFIX_PATH="$env:DEPS_PREFIX" `
            -DCONTAINER_CMAKE_DIR="$env:DEPS_PREFIX\lib\cmake\Container" `
            -DRABBITMQ_CMAKE_DIR="$env:RABBITMQ_CMAKE_DIR" `
            -DCPACK_IFW_ROOT="$env:QTIFW_ROOT" `
            -DBUILD_INSTALLER=ON

      - name: Build TerminalSim
        shell: pwsh
        run: cmake --build build

      - name: Install TerminalSim
        shell: pwsh
        run: cmake --build build --target install

      - name: Generate Windows installer
        shell: pwsh
        working-directory: build
        run: cpack -G IFW -C Release

      - name: Collect release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $refName = "${{ github.ref_name }}".Replace('/', '-')
          $installer = Get-ChildItem -Path build -Filter 'TerminalSim*.exe' -File |
                       Sort-Object Name | Select-Object -First 1
          if (-not $installer) {
              Write-Error "No Windows installer .exe was produced by CPack."
              Get-ChildItem -Path build -Recurse -Depth 2 -File | Format-Table FullName
              exit 1
          }
          $assetName = "TerminalSim-$refName-windows-x64.exe"
          Copy-Item $installer.FullName -Destination "dist\$assetName"
          $hash = (Get-FileHash -Algorithm SHA256 "dist\$assetName").Hash.ToLower()
          "$hash  $assetName" | Out-File -FilePath "dist\$assetName.sha256" -Encoding ascii
          Get-Content "dist\$assetName.sha256"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminalsim-windows
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------- Publish ---
  publish:
    name: Publish Release
    needs: [linux-installer, windows-installer]
    runs-on: ubuntu-24.04
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: terminalsim-linux
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: terminalsim-windows
          path: dist

      - name: List release assets
        run: ls -la dist

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TerminalSim-*-linux-*.run
            dist/TerminalSim-*-windows-*.exe
          generate_release_notes: true

      - name: Add checksums to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --json body --jq '.body // ""' > release-body.md

          awk '
            /^## Checksums$/ { skip = 1; next }
            skip && /^## / { skip = 0 }
            !skip { print }
          ' release-body.md > release-body-without-checksums.md

          {
            cat release-body-without-checksums.md
            printf '\n## Checksums\n\n'
            printf '| Asset | SHA256 |\n'
            printf '| --- | --- |\n'
            for sha in dist/*.sha256; do
              read -r checksum asset_name < "${sha}"
              printf '| `%s` | `%s` |\n' "${asset_name}" "${checksum}"
            done
          } > release-body-final.md

          gh release edit "${GITHUB_REF_NAME}" --notes-file release-body-final.md
